name: Iran News Auto Update
on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    - cron: '0 * * * *' # 매시간 실행

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 버전 사용

      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 버전 사용
        with:
          python-version: '3.10' # 더 대중적인 버전으로 변경

      - name: Run script
        env:
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
        run: |
          pip install gspread google-auth requests beautifulsoup4
          python main.py
