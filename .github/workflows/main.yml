name: Iran News Auto Update
on:
  workflow_dispatch: # 이 문장이 있어야 'Run workflow' 버튼이 생깁니다!
  schedule:
    - cron: '0 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script
        env:
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
        run: |
          pip install gspread google-auth requests beautifulsoup4
          python main.py
